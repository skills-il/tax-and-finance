name: Bug Report
description: Report a problem with a skill in this category
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: skill
    attributes:
      label: Which skill?
      options:
        - boi-economic-data
        - cardcom-payment-gateway
        - il-invoice-organizer
        - israeli-bank-connector
        - israeli-client-payment-chaser
        - israeli-e-invoice
        - israeli-freelancer-ops
        - israeli-payment-orchestrator
        - israeli-payroll-calculator
        - israeli-pension-advisor
        - israeli-startup-financial-model
        - israeli-tax-withholding
        - israeli-vat-reporting
        - shekel-currency-converter
        - tase-stock-analysis
        - tranzila-payment-gateway
        - Other
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Which AI agent?
      options:
        - Claude Code
        - Cursor
        - GitHub Copilot
        - Windsurf
        - OpenCode
        - OpenClaw
        - Codex
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe what went wrong...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      render: shell
